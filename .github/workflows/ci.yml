name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: enterprise_agent_hub_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d enterprise_agent_hub_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify Node and dependency compatibility
        run: |
          node -e "if (process.versions.node !== '20.19.5') { throw new Error('Node 20.19.5 is required') }"
          npm ls undici
      - name: Verify Node 20 Real API compatibility
        run: npm run test:real-api:node20
      - name: Validate PostgreSQL schema
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
        run: |
          npm run db:generate
          npm run db:validate
      - name: Deploy and inspect PostgreSQL migrations
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
        run: |
          npm run db:migrate:deploy
          npm run db:status
      - name: Run real PostgreSQL storage integration tests
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
          TEST_DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
          RUN_POSTGRES_INTEGRATION: "1"
        run: npm run test:storage:postgres
      - name: Verify V2.2.0 to V2.2.1 migration with retained data
        env:
          TEST_DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
          RUN_POSTGRES_INTEGRATION: "1"
        run: npm run test:migration:v221
      - name: Verify V2.2.1 to V2.2.2 migration with retained data
        env:
          TEST_DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
          RUN_POSTGRES_INTEGRATION: "1"
        run: npm run test:migration:v222
      - name: Run import hardening tests
        run: npm run test:import:hardening
      - name: Run import pressure tests
        run: npm run test:import:stress
      - name: Run production readiness check
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
          SERVER_STORAGE_ENABLED: "true"
          STORAGE_SESSION_SECRET: ci-only-enterprise-agent-hub-storage-session-secret
        run: npm run production:check
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run security regression tests
        run: npm run test:run
      - name: Run typecheck
        run: npm run typecheck
      - name: Run browser E2E
        run: npm run e2e
      - name: Run PostgreSQL server-mode knowledge import E2E
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/enterprise_agent_hub_ci
          SERVER_STORAGE_ENABLED: "true"
          STORAGE_SESSION_SECRET: ci-only-enterprise-agent-hub-storage-session-secret
          RUN_SERVER_STORAGE_E2E: "1"
        run: npm run e2e -- e2e/knowledge-import-postgres.spec.ts
      - name: Run full Mock evaluation
        run: npm run evaluation:mock
      - name: Build production bundle
        run: npm run build
      - name: Verify clean patch formatting
        run: git diff --check
